<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" fill="none">
  <defs>
    <linearGradient id="dc-bg" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#050f1a"/>
      <stop offset="0.5" stop-color="#0A2540"/>
      <stop offset="1" stop-color="#0c2d4a"/>
    </linearGradient>
    <linearGradient id="dc-rack" x1="0" y1="0" x2="0" y2="1">
      <stop stop-color="#163a58"/>
      <stop offset="1" stop-color="#0A2540"/>
    </linearGradient>
    <linearGradient id="dc-link" x1="0" y1="0" x2="1" y2="0">
      <stop stop-color="#00D4FF" stop-opacity="0.2"/>
      <stop offset="0.5" stop-color="#6ECFFF"/>
      <stop offset="1" stop-color="#00D4FF" stop-opacity="0.2"/>
    </linearGradient>
    <filter id="dc-glow">
      <feGaussianBlur stdDeviation="6"/>
    </filter>
  </defs>
  <rect width="800" height="450" fill="url(#dc-bg)"/>
  <circle cx="400" cy="200" r="160" fill="#00D4FF" opacity="0.04"/>
  <!-- floor -->
  <path d="M0 360 L800 360 L800 450 L0 450Z" fill="#061829"/>
  <path d="M0 360 L80 300 H720 L800 360Z" fill="#0a1f35" opacity="0.8"/>
  <!-- left hall racks -->
  <g>
    <rect x="90" y="140" width="70" height="200" rx="6" fill="url(#dc-rack)" stroke="#1e4a6f"/>
    <rect x="175" y="120" width="70" height="220" rx="6" fill="url(#dc-rack)" stroke="#1e4a6f"/>
    <rect x="260" y="150" width="70" height="190" rx="6" fill="url(#dc-rack)" stroke="#1e4a6f"/>
  </g>
  <!-- right hall racks -->
  <g>
    <rect x="470" y="150" width="70" height="190" rx="6" fill="url(#dc-rack)" stroke="#1e4a6f"/>
    <rect x="555" y="120" width="70" height="220" rx="6" fill="url(#dc-rack)" stroke="#1e4a6f"/>
    <rect x="640" y="140" width="70" height="200" rx="6" fill="url(#dc-rack)" stroke="#1e4a6f"/>
  </g>
  <!-- LEDs -->
  <g>
    <rect x="102" y="160" width="46" height="6" rx="1" fill="#00D4FF" opacity="0.7"/>
    <rect x="102" y="175" width="46" height="6" rx="1" fill="#6ECFFF" opacity="0.35"/>
    <rect x="102" y="190" width="46" height="6" rx="1" fill="#00D4FF" opacity="0.55"/>
    <rect x="102" y="205" width="46" height="6" rx="1" fill="#6ECFFF" opacity="0.3"/>
    <rect x="102" y="220" width="46" height="6" rx="1" fill="#00D4FF" opacity="0.65"/>
    <rect x="187" y="140" width="46" height="6" rx="1" fill="#B8F0FF" opacity="0.8"/>
    <rect x="187" y="155" width="46" height="6" rx="1" fill="#00D4FF" opacity="0.5"/>
    <rect x="187" y="170" width="46" height="6" rx="1" fill="#6ECFFF" opacity="0.4"/>
    <rect x="187" y="185" width="46" height="6" rx="1" fill="#00D4FF" opacity="0.7"/>
    <rect x="272" y="170" width="46" height="6" rx="1" fill="#00D4FF" opacity="0.55"/>
    <rect x="272" y="185" width="46" height="6" rx="1" fill="#6ECFFF" opacity="0.45"/>
    <rect x="272" y="200" width="46" height="6" rx="1" fill="#00D4FF" opacity="0.6"/>
    <rect x="482" y="170" width="46" height="6" rx="1" fill="#00D4FF" opacity="0.6"/>
    <rect x="482" y="185" width="46" height="6" rx="1" fill="#6ECFFF" opacity="0.4"/>
    <rect x="482" y="200" width="46" height="6" rx="1" fill="#00D4FF" opacity="0.55"/>
    <rect x="567" y="140" width="46" height="6" rx="1" fill="#B8F0FF" opacity="0.75"/>
    <rect x="567" y="155" width="46" height="6" rx="1" fill="#00D4FF" opacity="0.5"/>
    <rect x="567" y="170" width="46" height="6" rx="1" fill="#6ECFFF" opacity="0.45"/>
    <rect x="652" y="160" width="46" height="6" rx="1" fill="#00D4FF" opacity="0.65"/>
    <rect x="652" y="175" width="46" height="6" rx="1" fill="#6ECFFF" opacity="0.35"/>
    <rect x="652" y="190" width="46" height="6" rx="1" fill="#00D4FF" opacity="0.55"/>
  </g>
  <!-- optical link between halls -->
  <path d="M330 220 C380 180 420 180 470 220" stroke="url(#dc-link)" stroke-width="4" fill="none" stroke-linecap="round"/>
  <path d="M330 240 C380 280 420 280 470 240" stroke="#00D4FF" stroke-width="2" fill="none" opacity="0.4" stroke-linecap="round"/>
  <circle cx="400" cy="220" r="16" fill="#00D4FF" opacity="0.15" filter="url(#dc-glow)"/>
  <circle cx="400" cy="220" r="5" fill="#B8F0FF"/>
  <text x="358" y="210" fill="#8BA4BC" font-family="system-ui,sans-serif" font-size="11">+2 дБ</text>
  <rect x="28" y="28" width="280" height="36" rx="18" fill="#00D4FF" fill-opacity="0.12" stroke="#6ECFFF" stroke-opacity="0.35"/>
  <text x="48" y="51" fill="#6ECFFF" font-family="system-ui,sans-serif" font-size="15" font-weight="600">ЦОД · 280 км · резервный канал</text>
</svg>
